
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Image Map Navigation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
        }


    .nav-image {
    opacity: 0;
 
    transition: opacity 0.5s ;
    visibility: 0.1s ease-in;
    width: 100%;
    height: 100vh;
}
#img1{
    opacity: 1;
}

.nav-image:target {
    opacity: 1;
    visibility: visible;
}





        .nav-dots {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 40px;
        }

        .nav-dots a {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transition: all 0.3s;
            display: block;
        }

        .nav-dots a:hover {
            background: white;
            transform: scale(1.3);
        }

        /* Current page indicator using :target */
    </style>
</head>

<body>
    <div class="container">

        <img src="images/img_1.jpg" class="nav-image" id="img1" usemap="#map1" alt="Image 1">
        <img src="images/img_2.jpg" class="nav-image" id="img2" usemap="#map2" alt="Image 2">
        <img src="images/img_3.jpg" class="nav-image" id="img3" usemap="#map3" alt="Image 3">
        <img src="images/img_4.jpg" class="nav-image" id="img4" usemap="#map4" alt="Image 4">
        <img src="images/img_5.jpg" class="nav-image" id="img5" usemap="#map5" alt="Image 5">
        <img src="images/img_6.jpg" class="nav-image" id="img6" usemap="#map6" alt="Image 6">
        <img src="images/img_7.jpg" class="nav-image" id="img7" usemap="#map7" alt="Image 7">
        <img src="images/img_8.jpg" class="nav-image" id="img8" usemap="#map8" alt="Image 8">
        <img src="images/img_8.jpg" class="nav-image" id="img8" usemap="#map8" alt="Image 8">
        <img src="images/img_9.jpg" class="nav-image" id="img9" usemap="#map9" alt="Image 9">
        <img src="images/img_10.jpg" class="nav-image" id="img10" usemap="#map10" alt="Image 10">

        <img src="images/img_17.jpg" class="nav-image" id="img17" usemap="#map17" alt="Image 17">

        <!------------------------------------------------------------------------------------------------->
