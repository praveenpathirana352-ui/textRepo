<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width,initial-sacle=1.0">
        <title>Drag anf Drop</title>
        <link rel="stylesheet" href="style5.css">
        </head>
        <body>
            <div class="container">
                <div id="left">
                    <div class="list" draggable="true"><img src="2704shrilanka-1024x575.png">List item1</div>
                    <div class="list" draggable="true"><img src="2704shrilanka-1024x575.png">List item2</div>
                    <div class="list" draggable="true"><img src="2704shrilanka-1024x575.png">List item3</div>
                    <div class="list" draggable="true"><img src="2704shrilanka-1024x575.png">List item4</div>
                    <div class="list" draggable="true"><img src="2704shrilanka-1024x575.png">List item5</div>
                    <div class="list" draggable="true"><img src="2704shrilanka-1024x575.png">List item6</div>
                </div>
            
                <div id="right">
                    </div>
                </div>

            
            <script>
                let lists=document.getElementsByClassName("list");
                let rightBox=document.getElementById("right");
                let leftBox=document.getElementById("left");

                for (list of lists){
                    list.addEventListener("dragstart",function(e){
                        let selected=e.target;
                        
                        rightBox.addEventListener("dragover",function(e){
                            e.preventDefault();
                        });
                        rightBox.addEventListener("drop",function(e){
                            rightBox.appendChild(selected);
                            selected = null;
                        });
                        leftBox.addEventListener("dragover",function(e){
                            e.preventDefault();
                        });
                        leftBox.addEventListener("drop",function(e){
                            leftBox.appendChild(selected);
                            selected = null;
                        });
                    })
                }
                </script>

            </body>
            </html>
